name: CI-CD

on:
  pull_request:
  push:
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI (Lint, Build, Syntax Check)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            gateway/package-lock.json
            services/auth-service/package-lock.json
            services/org-service/package-lock.json
            services/entry-service/package-lock.json
            services/analytics-service/package-lock.json
            services/decision-service/package-lock.json
            services/api-gateway/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install service dependencies
        run: |
          npm ci --prefix client
          npm ci --prefix gateway
          npm ci --prefix services/auth-service
          npm ci --prefix services/org-service
          npm ci --prefix services/entry-service
          npm ci --prefix services/analytics-service
          npm ci --prefix services/decision-service
          npm ci --prefix services/api-gateway

      - name: Lint client
        run: npm run lint --prefix client

      - name: Build client
        run: npm run build --prefix client

      - name: JS syntax check (all tracked JS files)
        run: git ls-files "*.js" | xargs -I {} node --check "{}"

  docker-publish:
    name: CD (Build and Publish Docker Images)
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: client
            context: ./client
            dockerfile: ./client/Dockerfile
          - name: gateway
            context: ./gateway
            dockerfile: ./gateway/Dockerfile
          - name: auth-service
            context: ./services/auth-service
            dockerfile: ./services/auth-service/Dockerfile
          - name: org-service
            context: ./services/org-service
            dockerfile: ./services/org-service/Dockerfile
          - name: entry-service
            context: ./services/entry-service
            dockerfile: ./services/entry-service/Dockerfile
          - name: analytics-service
            context: ./services/analytics-service
            dockerfile: ./services/analytics-service/Dockerfile
          - name: decision-service
            context: ./services/decision-service
            dockerfile: ./services/decision-service/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/think-twice-${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  render-deploy:
    name: CD (Trigger Render Deploy)
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy hooks
        env:
          RENDER_DEPLOY_HOOK_GATEWAY: ${{ secrets.RENDER_DEPLOY_HOOK_GATEWAY }}
          RENDER_DEPLOY_HOOK_AUTH: ${{ secrets.RENDER_DEPLOY_HOOK_AUTH }}
          RENDER_DEPLOY_HOOK_ORG: ${{ secrets.RENDER_DEPLOY_HOOK_ORG }}
          RENDER_DEPLOY_HOOK_ENTRY: ${{ secrets.RENDER_DEPLOY_HOOK_ENTRY }}
          RENDER_DEPLOY_HOOK_ANALYTICS: ${{ secrets.RENDER_DEPLOY_HOOK_ANALYTICS }}
        run: |
          trigger_hook() {
            local service="$1"
            local url="$2"

            if [ -z "$url" ]; then
              echo "Skipping ${service}: hook is not configured."
              return 0
            fi

            echo "Triggering ${service} deploy hook..."
            curl --fail --show-error --silent --request POST "$url"
            echo "Triggered ${service} successfully."
          }

          trigger_hook "gateway" "$RENDER_DEPLOY_HOOK_GATEWAY"
          trigger_hook "auth" "$RENDER_DEPLOY_HOOK_AUTH"
          trigger_hook "org" "$RENDER_DEPLOY_HOOK_ORG"
          trigger_hook "entry" "$RENDER_DEPLOY_HOOK_ENTRY"
          trigger_hook "analytics" "$RENDER_DEPLOY_HOOK_ANALYTICS"
