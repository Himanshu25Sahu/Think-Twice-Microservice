services:
  mongodb:
    image: mongo:7
    container_name: tt-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - tt-network
    restart: unless-stopped
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')" --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tt-redis
    ports:
      - "6379:6379"
    networks:
      - tt-network
    restart: unless-stopped
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./services/auth-service
    container_name: tt-auth
    environment:
      NODE_ENV: development
      PORT: 5001
      MONGODB_URI: mongodb://mongodb:27017/tt-auth
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-change-in-production}
      JWT_EXPIRES_IN: 3d
    ports:
      - "5001:5001"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - tt-network
    restart: unless-stopped

  org-service:
    build:
      context: ./services/org-service
    container_name: tt-org
    environment:
      NODE_ENV: development
      PORT: 5003
      MONGODB_URI: mongodb://mongodb:27017/tt-orgs
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth-service:5001
    ports:
      - "5003:5003"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - tt-network
    restart: unless-stopped

  entry-service:
    build:
      context: ./services/entry-service
    container_name: tt-entry
    environment:
      NODE_ENV: development
      PORT: 5002
      MONGODB_URI: mongodb://mongodb:27017/tt-entries
      REDIS_URL: redis://redis:6379
      ORG_SERVICE_URL: http://org-service:5003
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    ports:
      - "5002:5002"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      org-service:
        condition: service_started
    networks:
      - tt-network
    restart: unless-stopped

  analytics-service:
    build:
      context: ./services/analytics-service
    container_name: tt-analytics
    environment:
      NODE_ENV: development
      PORT: 5004
      MONGODB_URI: mongodb://mongodb:27017/tt-analytics
      REDIS_URL: redis://redis:6379
    ports:
      - "5004:5004"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tt-network
    restart: unless-stopped

  gateway:
    build:
      context: ./gateway
    container_name: tt-gateway
    environment:
      NODE_ENV: development
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-change-in-production}
      FRONTEND_URL: http://localhost:3000
      AUTH_SERVICE_URL: http://auth-service:5001
      ORG_SERVICE_URL: http://org-service:5003
      ENTRY_SERVICE_URL: http://entry-service:5002
      ANALYTICS_SERVICE_URL: http://analytics-service:5004
    ports:
      - "5000:5000"
    depends_on:
      - auth-service
      - org-service
      - entry-service
      - analytics-service
    networks:
      - tt-network
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000
    container_name: tt-client
    ports:
      - "3000:3000"
    depends_on:
      - gateway
    networks:
      - tt-network
    restart: unless-stopped

networks:
  tt-network:
    driver: bridge

volumes:
  mongo-data: